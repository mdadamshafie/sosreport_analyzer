# Auto-provisioned datasources for SOSreport Analyzer
apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: sosanalyzer
      defaultBucket: sar_metrics
      httpHeaderName1: "Authorization"
    secureJsonData:
      token: local-sosreport-token-2026
      httpHeaderValue1: "Token local-sosreport-token-2026"
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
